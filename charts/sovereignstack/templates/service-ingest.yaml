{{- if .Values.ingest.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sovereignstack.fullname" . }}-ingest
  namespace: {{ include "sovereignstack.namespace" . }}
  labels:
    {{- include "sovereignstack.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-pipeline
spec:
  type: ClusterIP
  ports:
    - name: http-api
      port: 8081
      targetPort: {{ .Values.ingest.port }}
      protocol: TCP
  selector:
    app.kubernetes.io/component: ingestion-pipeline
    {{- include "sovereignstack.selectorLabels" . | nindent 4 }}
{{- end }}
