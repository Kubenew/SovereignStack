{{- if .Values.memory.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sovereignstack.fullname" . }}-memory
  namespace: {{ include "sovereignstack.namespace" . }}
  labels:
    {{- include "sovereignstack.labels" . | nindent 4 }}
    app.kubernetes.io/component: memory-store
spec:
  type: ClusterIP
  ports:
    - name: http-api
      port: 8082
      targetPort: {{ .Values.memory.port }}
      protocol: TCP
  selector:
    app.kubernetes.io/component: memory-store
    {{- include "sovereignstack.selectorLabels" . | nindent 4 }}
{{- end }}
