apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "sovereignstack.fullname" . }}-data-pvc
  namespace: {{ include "sovereignstack.namespace" . }}
  labels:
    {{- include "sovereignstack.labels" . | nindent 4 }}
    app.kubernetes.io/component: data-storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
