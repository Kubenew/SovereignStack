{{- if .Values.vllm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sovereignstack.fullname" . }}-vllm
  namespace: {{ include "sovereignstack.namespace" . }}
  labels:
    {{- include "sovereignstack.labels" . | nindent 4 }}
    app.kubernetes.io/component: inference-engine
spec:
  replicas: {{ .Values.vllm.replicaCount | default 1 }}
  strategy:
    {{- if .Values.canary.enabled }}
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.canary.maxSurge }}
      maxUnavailable: {{ .Values.canary.maxUnavailable }}
    {{- else }}
    type: Recreate
    {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: inference-engine
      {{- include "sovereignstack.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: inference-engine
        {{- include "sovereignstack.selectorLabels" . | nindent 8 }}
      annotations:
        oasa.compliance/layer: compute
        oasa.compliance/zero-exfiltration: "true"
    spec:
      {{- with .Values.vllm.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vllm.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vllm-engine
          image: "{{ .Values.vllm.image.repository }}:{{ .Values.vllm.image.tag }}"
          imagePullPolicy: {{ .Values.vllm.image.pullPolicy }}
          command:
            - vllm
            - serve
            - "/data/{{ .Values.vllm.model.name }}"
          args:
            - "--port"
            - "{{ .Values.vllm.port | quote }}"
            - "--max-model-len"
            - "{{ .Values.vllm.model.maxModelLen | quote }}"
            - "--gpu-memory-utilization"
            - "{{ .Values.vllm.model.gpuMemoryUtilization | quote }}"
            - "--tensor-parallel-size"
            - "{{ .Values.vllm.model.tensorParallelSize | quote }}"
            - "--pipeline-parallel-size"
            - "{{ .Values.vllm.model.pipelineParallelSize | quote }}"
            {{- if .Values.vllm.model.quantization }}
            - "--quantization"
            - "{{ .Values.vllm.model.quantization }}"
            {{- end }}
            {{- if .Values.vllm.model.flashAttention }}
            - "--enable-flash-attention"
            {{- end }}
          env:
            - name: HF_HUB_OFFLINE
              value: "1"
            {{- if .Values.vllm.model.flashAttention }}
            - name: VLLM_ATTENTION_BACKEND
              value: "FLASH_ATTN"
            {{- end }}
          ports:
            - name: http-api
              containerPort: {{ .Values.vllm.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http-api
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http-api
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.vllm.resources | nindent 12 }}
          volumeMounts:
            - name: model-volume
              mountPath: /data
              readOnly: true
      volumes:
        - name: model-volume
          persistentVolumeClaim:
            claimName: {{ include "sovereignstack.fullname" . }}-models-pvc
{{- end }}
