name: OASA Conformance & Certification Test Suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday run
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ===========================================================================
  # L1: OASA Compatible — basic validation, schema check, API compatibility
  # ===========================================================================
  l1-conformance:
    name: "OASA L1 — Compatible"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyyaml jsonschema requests pytest pytest-cov fastapi uvicorn pydantic python-multipart httpx
      - name: Validate all JSON schemas
        run: |
          for schema in schemas/*.json schemas/certification/*.json; do
            python -c "import json; json.load(open('$schema'))" && echo "  [OK] $schema"
          done
      - name: Validate sovereign-stack.yaml against schema
        run: |
          python tools/validate_compliance.py sovereign-stack.yaml
      - name: Run L1 conformance tests
        run: |
          python -m pytest tests/conformance/ -v --level L1 --tb=short -k "not level_L2 and not level_L3"
      - name: Test VRAM calculator
        run: |
          python tools/vram_calculator.py --params 8B --quant INT4 --budget 24
      - name: Test CLI version
        run: |
          python tools/sovereign_stack.py version
      - name: Generate L1 compliance report
        run: |
          python tools/generate_compliance_report.py --level L1 --output reports/l1-report.md
      - uses: actions/upload-artifact@v4
        with:
          name: oasa-l1-report
          path: reports/
          retention-days: 30

  # ===========================================================================
  # L2: OASA Verified — compliance lock, TPM binding, audit logs
  # ===========================================================================
  l2-conformance:
    name: "OASA L2 — Verified"
    runs-on: ubuntu-24.04
    needs: [l1-conformance]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run L2 conformance tests (all tests including marked L2)
        run: |
          python -m pytest tests/conformance/ -v --level L2 --tb=short
      - name: Generate L2 compliance report
        run: |
          python tools/generate_compliance_report.py --level L2 --output reports/l2-report.md
      - uses: actions/upload-artifact@v4
        with:
          name: oasa-l2-report
          path: reports/
          retention-days: 30

  # ===========================================================================
  # L3: OASA Certified — full suite with hardware attestation (simulated)
  # ===========================================================================
  l3-conformance:
    name: "OASA L3 — Certified"
    runs-on: ubuntu-24.04
    needs: [l2-conformance]
    if: github.ref == 'refs/heads/main'  # Only run on main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run all conformance tests at L3
        run: |
          python -m pytest tests/conformance/ -v --level L3 --tb=short
      - name: Generate comprehensive compliance report
        run: |
          python tools/generate_compliance_report.py --level L3 --output reports/l3-report.md
      - name: Verify Helm chart templates
        run: |
          if command -v helm &> /dev/null; then
            helm lint charts/sovereignstack/
            helm template test-release charts/sovereignstack/ --namespace sovereign-stack > /dev/null
          else
            echo "Helm not installed — skipping helm lint"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: oasa-l3-report
          path: reports/
          retention-days: 30

  # ===========================================================================
  # Combined badge generation
  # ===========================================================================
  badges:
    name: Generate OASA Badges
    runs-on: ubuntu-24.04
    needs: [l1-conformance, l2-conformance]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Generate dynamic status badges
        uses: actions/github-script@v7
        with:
          script: |
            const badges = {
              l1: ${{ needs.l1-conformance.result == 'success' }},
              l2: ${{ needs.l2-conformance.result == 'success' }}
            };
            console.log(`OASA L1: ${badges.l1 ? 'PASS' : 'FAIL'}`);
            console.log(`OASA L2: ${badges.l2 ? 'PASS' : 'FAIL'}`);

  # ===========================================================================
  # Multi-Python version compatibility matrix
  # ===========================================================================
  compatibility:
    name: Python ${{ matrix.python }} Compatibility
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyyaml jsonschema requests pytest fastapi uvicorn pydantic python-multipart httpx
      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short --ignore=tests/conformance
      - name: Validate schemas
        run: |
          python tools/validate_compliance.py sovereign-stack.yaml
