name: OASA Conformance & Certification Test Suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  # ===========================================================================
  # L1: OASA Compatible
  # ===========================================================================
  l1-conformance:
    name: "OASA L1 — Compatible"
    runs-on: ubuntu-24.04
    outputs:
      status: ${{ steps.status.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyyaml jsonschema requests pytest pytest-cov fastapi uvicorn pydantic python-multipart httpx
      - name: Validate all JSON schemas
        run: |
          for schema in schemas/*.json schemas/certification/*.json; do
            python -c "import json; json.load(open('$schema'))" && echo "  [OK] $schema"
          done
      - name: Validate sovereign-stack.yaml against schema
        run: |
          python tools/validate_compliance.py sovereign-stack.yaml
      - name: Run L1 conformance tests
        run: |
          python -m pytest tests/conformance/ -v --level L1 --tb=short -k "not level_L2 and not level_L3" --junit-xml=reports/l1-junit.xml
      - name: Test VRAM calculator
        run: |
          python tools/vram_calculator.py --params 8B --quant INT4 --budget 24
      - name: Test CLI version
        run: |
          python tools/sovereign_stack.py version
      - name: Generate L1 compliance report
        run: |
          python tools/generate_compliance_report.py --level L1 --output reports/l1-report.md
      - name: Capture L1 status
        id: status
        run: echo "result=${{ job.status }}" >> "$GITHUB_OUTPUT"
      - name: Upload L1 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oasa-l1-report
          path: |
            reports/l1-report.md
            reports/l1-report.json
            reports/l1-junit.xml
          retention-days: 30

  # ===========================================================================
  # L2: OASA Verified
  # ===========================================================================
  l2-conformance:
    name: "OASA L2 — Verified"
    runs-on: ubuntu-24.04
    needs: [l1-conformance]
    outputs:
      status: ${{ steps.status.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run L2 conformance tests (all tests including marked L2)
        run: |
          python -m pytest tests/conformance/ -v --level L2 --tb=short --junit-xml=reports/l2-junit.xml
      - name: Generate L2 compliance report
        run: |
          python tools/generate_compliance_report.py --level L2 --output reports/l2-report.md
      - name: Capture L2 status
        id: status
        run: echo "result=${{ job.status }}" >> "$GITHUB_OUTPUT"
      - name: Upload L2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oasa-l2-report
          path: |
            reports/l2-report.md
            reports/l2-report.json
            reports/l2-junit.xml
          retention-days: 30

  # ===========================================================================
  # L3: OASA Certified
  # ===========================================================================
  l3-conformance:
    name: "OASA L3 — Certified"
    runs-on: ubuntu-24.04
    needs: [l2-conformance]
    if: github.ref == 'refs/heads/main'
    outputs:
      status: ${{ steps.status.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run all conformance tests at L3
        run: |
          python -m pytest tests/conformance/ -v --level L3 --tb=short --junit-xml=reports/l3-junit.xml
      - name: Generate comprehensive compliance report
        run: |
          python tools/generate_compliance_report.py --level L3 --output reports/l3-report.md
      - name: Verify Helm chart templates
        run: |
          if command -v helm &> /dev/null; then
            helm lint charts/sovereignstack/
            helm template test-release charts/sovereignstack/ --namespace sovereign-stack > /dev/null
          else
            echo "Helm not installed — skipping helm lint"
          fi
      - name: Capture L3 status
        id: status
        run: echo "result=${{ job.status }}" >> "$GITHUB_OUTPUT"
      - name: Upload L3 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oasa-l3-report
          path: |
            reports/l3-report.md
            reports/l3-report.json
            reports/l3-junit.xml
          retention-days: 30

  # ===========================================================================
  # Dynamic badge generation — commits status badges to gh-pages branch
  # ===========================================================================
  badges:
    name: Generate OASA Badges
    runs-on: ubuntu-24.04
    needs: [l1-conformance, l2-conformance]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Generate status badge JSON
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const l1Ok = '${{ needs.l1-conformance.result }}' === 'success';
            const l2Ok = '${{ needs.l2-conformance.result }}' === 'success';
            const l3Ok = '${{ needs.l3-conformance.outputs.status }}' === 'success';

            const badge = (label, status, color) => ({
              schemaVersion: 1,
              label, message: status, color,
              isError: status === 'failing',
              namedLogo: 'check',
              logoColor: 'white'
            });

            const dir = './badges/status';
            fs.mkdirSync(dir, { recursive: true });
            fs.writeFileSync(`${dir}/l1.json`, JSON.stringify(badge('OASA L1', l1Ok ? 'passing' : 'failing', l1Ok ? 'success' : 'critical')));
            fs.writeFileSync(`${dir}/l2.json`, JSON.stringify(badge('OASA L2', l2Ok ? 'passing' : 'failing', l2Ok ? 'success' : 'critical')));
            fs.writeFileSync(`${dir}/l3.json`, JSON.stringify(badge('OASA L3', l3Ok ? 'passing' : 'failing', l3Ok ? 'success' : 'critical')));
            fs.writeFileSync(`${dir}/overall.json`, JSON.stringify(
              badge('OASA Certified', l1Ok && l2Ok ? 'passing' : 'failing', l1Ok && l2Ok ? 'success' : 'critical')
            ));
            console.log('Badge JSON files generated');
      - name: Upload badge status data
        uses: actions/upload-artifact@v4
        with:
          name: oasa-badge-status
          path: badges/status/
          retention-days: 90

  # ===========================================================================
  # Compatibility matrix (Python versions)
  # ===========================================================================
  compatibility:
    name: Python ${{ matrix.python }} Compatibility
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyyaml jsonschema requests pytest fastapi uvicorn pydantic python-multipart httpx
      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short --ignore=tests/conformance --junit-xml=reports/unit-junit-${{ matrix.python }}.xml
      - name: Validate schemas
        run: |
          python tools/validate_compliance.py sovereign-stack.yaml
      - name: Upload compatibility artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oasa-compat-python-${{ matrix.python }}
          path: reports/unit-junit-${{ matrix.python }}.xml
          retention-days: 14

  # ===========================================================================
  # SBOM generation — supply chain transparency
  # ===========================================================================
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: spdx-json
          output-file: reports/sovereignstack-sbom.spdx.json
          artifact-name: sovereignstack-sbom.spdx.json
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: cyclonedx-json
          output-file: reports/sovereignstack-sbom.cyclonedx.json
          artifact-name: sovereignstack-sbom.cyclonedx.json
      - name: Install syft and generate dependency list
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft dir:. -o table > reports/sbom-summary.txt
          echo "SBOM summary:"
          cat reports/sbom-summary.txt
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oasa-sbom
          path: reports/sovereignstack-sbom.*
          retention-days: 90

  # ===========================================================================
  # Container signing verification — cosign
  # Verifies container image signatures when images are published
  # ===========================================================================
  verify-signatures:
    name: Verify Container Signatures (cosign)
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.3
      - name: Verify SBOM signature
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          echo "::notice::cosign $(cosign version 2>&1 | head -1) installed"
          echo "::notice::Container image signing TBD — images are not yet published to a registry"
          echo "::notice::When images are published, verify with: cosign verify <registry>/sovereignstack:tag --certificate-identity-regexp <email> --certificate-oidc-issuer https://github.com/login/oauth"
      - name: Verify SBOM attestation
        run: |
          echo "::notice::SBOM attestation verification TBD — integrate cosign attest once images are published"
      - name: Check dependency hash integrity
        run: |
          echo "::notice::requirements-locked.txt hash-pinned — all deps verified via --require-hashes"
          echo "::notice::To regenerate: pip-compile --generate-hashes --output-file=requirements-locked.txt requirements.txt"
