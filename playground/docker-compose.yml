# =============================================================================
# SovereignStack Playground — Docker Compose
# =============================================================================
# Deploy a full OASA-compliant AI stack locally in 2 minutes.
#
# Quick Start:
#   cd playground/
#   docker compose up -d
#   curl http://localhost:8080/v1/chat/completions ...
#
# This spins up:
#   1. turboprivate-ai  — OpenAI-compatible API gateway (port 8080)
#   2. vllm/llama.cpp   — Local LLM inference engine
#   3. TurboMemory      — Encrypted vector store (Qdrant-based)
#   4. Compliance proxy  — OASA-Lock enforcement layer
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # 1. API GATEWAY — turboprivate-ai (OpenAI-compatible proxy)
  # --------------------------------------------------------------------------
  gateway:
    image: ghcr.io/kubenew/turboprivate-ai:latest
    container_name: oasa-gateway
    ports:
      - "8080:8080"
    environment:
      - OASA_COMPLIANCE_LEVEL=STRICT
      - OASA_LOCK_ENABLED=true
      - OASA_LOCK_ON_FAILURE=BLOCK           # 503 instead of cloud fallback
      - INFERENCE_BACKEND_URL=http://inference:8000
      - VECTOR_STORE_URL=http://vectordb:6333
      - AUDIT_LOG_PATH=/var/log/oasa/audit.jsonl
      - AUDIT_IMMUTABLE=true
    volumes:
      - audit-logs:/var/log/oasa
      - ./config/sovereign-stack.yaml:/etc/oasa/sovereign-stack.yaml:ro
    depends_on:
      inference:
        condition: service_healthy
      vectordb:
        condition: service_healthy
    networks:
      - oasa-internal
    # OASA-Lock: block ALL external network access
    dns:
      - 127.0.0.1
    extra_hosts:
      - "api.openai.com:127.0.0.1"
      - "api.anthropic.com:127.0.0.1"
      - "api.cohere.ai:127.0.0.1"
      - "generativelanguage.googleapis.com:127.0.0.1"
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # 2. INFERENCE ENGINE — Local LLM (llama.cpp / vLLM)
  # --------------------------------------------------------------------------
  inference:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: oasa-inference
    ports:
      - "8000:8000"
    environment:
      - LLAMA_ARG_MODEL=/models/model.gguf
      - LLAMA_ARG_CTX_SIZE=4096
      - LLAMA_ARG_N_GPU_LAYERS=99
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8000
    volumes:
      - ./models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - oasa-internal
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # 3. VECTOR STORE — TurboMemory (Qdrant-based, encrypted)
  # --------------------------------------------------------------------------
  vectordb:
    image: qdrant/qdrant:latest
    container_name: oasa-vectordb
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
    volumes:
      - vector-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - oasa-internal
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # 4. COMPLIANCE DASHBOARD (optional)
  # --------------------------------------------------------------------------
  dashboard:
    image: ghcr.io/kubenew/oasa-dashboard:latest
    container_name: oasa-dashboard
    ports:
      - "3000:3000"
    environment:
      - GATEWAY_URL=http://gateway:8080
      - VECTORDB_URL=http://vectordb:6333
    depends_on:
      - gateway
    networks:
      - oasa-internal
    restart: unless-stopped

# ===========================================================================
# NETWORK — Internal only, no external access
# ===========================================================================
networks:
  oasa-internal:
    driver: bridge
    internal: true    # <-- KEY: prevents any container from reaching the internet

# ===========================================================================
# VOLUMES — Persistent, encrypted at rest (via host-level encryption)
# ===========================================================================
volumes:
  vector-data:
    driver: local
  audit-logs:
    driver: local
