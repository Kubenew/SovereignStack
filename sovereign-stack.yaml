oasa_version: "2026.1"
node:
  name: "sovereign-node-01"
  air_gapped: true
  tpm_required: true
  encryption: "AES-256-GCM"
services:
  gateway:
    enabled: true
    listen: "0.0.0.0:8080"
  ingest:
    enabled: true
    listen: "0.0.0.0:8081"
  memory:
    enabled: true
    listen: "0.0.0.0:8082"
    vector_backend: "local-json"
  compute:
    enabled: true
    listen: "0.0.0.0:8083"
    backend: "local"
    vram_budget_gb: 24
models:
  allowed:
    - "sovereign-llama3"
    - "sovereign-mistral"
