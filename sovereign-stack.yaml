oasa_version: "2026.1"
node:
  name: "sovereign-node-01"
  air_gapped: true
  tpm_required: true
  encryption: "AES-256-GCM"
  sandboxing:
    runtime: "gvisor"         # Options: gvisor, kata, firecracker, none
    confidential_compute: false
services:
  gateway:
    enabled: true
    listen: "0.0.0.0:8080"
    identity:
      enabled: true
      provider: "keycloak"
      issuer_url: "http://keycloak.local/auth/realms/sovereign"
      client_id: "sovereign-gateway"
    policy:
      enabled: true
      engine: "opa"
      policy_path: "./policies/inference.rego"
    observability:
      enabled: true
      opentelemetry_endpoint: "http://otel-collector.local:4317"
      prometheus_enabled: true
  ingest:
    enabled: true
    listen: "0.0.0.0:8081"
  memory:
    enabled: true
    listen: "0.0.0.0:8082"
    vector_backend: "local-json"
  compute:
    enabled: true
    listen: "0.0.0.0:8083"
    backend: "local"
    vram_budget_gb: 24
    registry:
      enabled: true
      registry_url: "http://registry.local/v2"
      require_signed_weights: true
models:
  allowed:
    - "sovereign-llama3"
    - "sovereign-mistral"
