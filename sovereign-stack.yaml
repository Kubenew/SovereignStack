# =============================================================================
# SovereignStack — Sovereign Node Manifest (Enterprise Appliance)
# =============================================================================
# This file declares the full OASA-compliant AI infrastructure for a single
# Sovereign Node. It acts as the definitive architecture blueprint.
#
# Deploy:  sovereign-stack deploy sovereign-stack.yaml
# Verify:  sovereign-stack validate sovereign-stack.yaml --audit-host
# Shield:  python tools/runtime_shield.py --config sovereign-stack.yaml --cmd "..."
# =============================================================================

version: "2026.1"
metadata:
  name: "sovereign-enterprise-appliance"
  tier: "production-airgapped"
  compliance_profile: "OASA-STRICT-GDPR-HIPAA"

# 1. Слой суверенной оркестрации (OASA-Node) -> База: privatecloud
node_infrastructure:
  engine: "privatecloud-k8s"
  air_gapped_enforcement: true
  storage:
    ephemeral_encrypted: true
    encryption_algorithm: "AES-256-GCM"
    hardware_tpm_binding: true
  network_isolation:
    allow_wan: false
    dns_mode: "LOCAL_ONLY"
    allowed_internal_cidrs:
      - "10.0.0.0/8"
      - "192.168.0.0/16"

# 2. Слой обработки документов (OASA-Ingest) -> База: pdf2struct
data_ingestion:
  service_name: "pdf2struct-pipeline"
  max_parallel_workers: 4
  memory_processing_mode: "VOLATILE_RAM_ONLY"
  enforce_strict_json_schema: true
  input_formats:
    - "PDF"
    - "TIFF"
    - "DOCX"

# 3. Слой памяти и контекста (OASA-Memory) -> База: TurboMemory
cognitive_memory:
  backend: "TurboMemory-Isolated"
  vector_dimensions: 4096
  encryption_at_rest: true
  context_ttl_seconds: 3600
  kv_cache_isolation: true

# 4. Слой оптимизации и исполнения (OASA-Compute) -> База: TurboQuant-v3 / turboprivate-ai
compute_execution:
  gateway: "turboprivate-ai-proxy"
  optimization_engine: "TurboQuant-v3"
  precision: "INT4_AWQ"
  openai_api_compatibility: true
  hardware:
    accelerator: "NVIDIA_CUDA"
    vram_budget_gb: 24
    allow_cpu_fallback: false
  runtime_protection:
    enforce_compliance_lock: true
    memory_leak_threshold_mb: 512
    max_token_context: 8192
