apiVersion: v1
kind: Namespace
metadata:
  name: sovereignstack
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oasa-gateway
  namespace: sovereignstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oasa-gateway
  template:
    metadata:
      labels:
        app: oasa-gateway
    spec:
      containers:
      - name: gateway
        image: sovereignstack:latest
        command: ["uvicorn","services.gateway_service:app","--host","0.0.0.0","--port","8080"]
        ports:
        - containerPort: 8080
