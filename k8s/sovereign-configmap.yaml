apiVersion: v1
data:
  sovereign-stack.yaml: "# =============================================================================\n\
    # SovereignStack \u2014 Sovereign Node Manifest (Enterprise Appliance)\n# =============================================================================\n\
    # This file declares the full OASA-compliant AI infrastructure for a single\n\
    # Sovereign Node. It acts as the definitive architecture blueprint.\n#\n# Deploy:\
    \  sovereign-stack deploy sovereign-stack.yaml\n# Verify:  sovereign-stack validate\
    \ sovereign-stack.yaml --audit-host\n# Shield:  python tools/runtime_shield.py\
    \ --config sovereign-stack.yaml --cmd \"...\"\n# =============================================================================\n\
    \nversion: \"2026.1\"\nmetadata:\n  name: \"sovereign-enterprise-appliance\"\n\
    \  tier: \"production-airgapped\"\n  compliance_profile: \"OASA-STRICT-GDPR-HIPAA\"\
    \n\n# 1. \u0421\u043B\u043E\u0439 \u0441\u0443\u0432\u0435\u0440\u0435\u043D\u043D\
    \u043E\u0439 \u043E\u0440\u043A\u0435\u0441\u0442\u0440\u0430\u0446\u0438\u0438\
    \ (OASA-Node) -> \u0411\u0430\u0437\u0430: privatecloud\nnode_infrastructure:\n\
    \  engine: \"privatecloud-k8s\"\n  air_gapped_enforcement: true\n  storage:\n\
    \    ephemeral_encrypted: true\n    encryption_algorithm: \"AES-256-GCM\"\n  \
    \  hardware_tpm_binding: true\n  network_isolation:\n    allow_wan: false\n  \
    \  dns_mode: \"LOCAL_ONLY\"\n    allowed_internal_cidrs:\n      - \"10.0.0.0/8\"\
    \n      - \"192.168.0.0/16\"\n\n# 2. \u0421\u043B\u043E\u0439 \u043E\u0431\u0440\
    \u0430\u0431\u043E\u0442\u043A\u0438 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\
    \u0442\u043E\u0432 (OASA-Ingest) -> \u0411\u0430\u0437\u0430: pdf2struct\ndata_ingestion:\n\
    \  service_name: \"pdf2struct-pipeline\"\n  max_parallel_workers: 4\n  memory_processing_mode:\
    \ \"VOLATILE_RAM_ONLY\"\n  enforce_strict_json_schema: true\n  input_formats:\n\
    \    - \"PDF\"\n    - \"TIFF\"\n    - \"DOCX\"\n\n# 3. \u0421\u043B\u043E\u0439\
    \ \u043F\u0430\u043C\u044F\u0442\u0438 \u0438 \u043A\u043E\u043D\u0442\u0435\u043A\
    \u0441\u0442\u0430 (OASA-Memory) -> \u0411\u0430\u0437\u0430: TurboMemory\ncognitive_memory:\n\
    \  backend: \"TurboMemory-Isolated\"\n  vector_dimensions: 4096\n  encryption_at_rest:\
    \ true\n  context_ttl_seconds: 3600\n  kv_cache_isolation: true\n\n# 4. \u0421\
    \u043B\u043E\u0439 \u043E\u043F\u0442\u0438\u043C\u0438\u0437\u0430\u0446\u0438\
    \u0438 \u0438 \u0438\u0441\u043F\u043E\u043B\u043D\u0435\u043D\u0438\u044F (OASA-Compute)\
    \ -> \u0411\u0430\u0437\u0430: TurboQuant-v3 / turboprivate-ai\ncompute_execution:\n\
    \  gateway: \"turboprivate-ai-proxy\"\n  optimization_engine: \"TurboQuant-v3\"\
    \n  precision: \"INT4_AWQ\"\n  openai_api_compatibility: true\n  hardware:\n \
    \   accelerator: \"NVIDIA_CUDA\"\n    vram_budget_gb: 24\n    allow_cpu_fallback:\
    \ false\n  runtime_protection:\n    enforce_compliance_lock: true\n    memory_leak_threshold_mb:\
    \ 512\n    max_token_context: 8192\n"
kind: ConfigMap
metadata:
  name: oasa-stack-config
  namespace: sovereign-stack
