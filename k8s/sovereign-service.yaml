apiVersion: v1
kind: Service
metadata:
  name: sovereign-ai-gateway
  namespace: sovereign-stack
  labels:
    oasa.compliance/standard: oasa-strict
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http-api
  selector:
    app: sovereign-ai-node
