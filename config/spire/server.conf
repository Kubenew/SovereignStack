server {
    trust_domain = "sovereign.stack"
    federation {
        bundle_endpoint {
            address = "0.0.0.0"
            port = 8441
        }
    }
    ca_subject {
        country = "US"
        organization = "SovereignStack"
        common_name = "SovereignStack SPIRE Server CA"
    }
    ca_key_type = "ec-p384"
    default_svid_ttl = "1h"
    registration_sql {
        database_type = "sqlite3"
        connection_string = "/data/spire/server.db"
    }
    experimental {
        allow_agent_less = false
    }
}

plugins {
    DataStore "sqlite3" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/data/spire/server.db"
        }
    }
    NodeAttestor "join_token" {
        plugin_data {}
    }
    KeyManager "disk" {
        plugin_data {
            keys_path = "/data/spire/keys.json"
        }
    }
}
