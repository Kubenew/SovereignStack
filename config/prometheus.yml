global:
  scrape_interval: 15s

rule_files:
  - "prometheus-alerts.yml"

scrape_configs:
  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:8080"]
  - job_name: "vllm"
    static_configs:
      - targets: ["vllm:8000"]
  - job_name: "ingest"
    static_configs:
      - targets: ["ingest:8081"]
  - job_name: "memory"
    static_configs:
      - targets: ["memory:8082"]
